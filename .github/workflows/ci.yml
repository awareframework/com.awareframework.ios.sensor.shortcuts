name: Sensor CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: swift test
